# 零服务器 GitHub Actions 运行TrendRadar+推送企业微信
name: TrendRadar-Run-Wechat-Push

# 触发规则：支持手动点按钮跑、定时跑、推送代码自动跑
on:
  workflow_dispatch: # 核心！小白可以网页手动点击运行，最友好
  schedule:
    - cron: '0 8 * * *' # 可选：每天早8点自动定时跑，不懂别动

jobs:
  run-job:
    runs-on: ubuntu-latest # 用GitHub免费云端Linux，零服务器
    steps:
      - name: 拉取你Fork的代码
        uses: actions/checkout@v4

      - name: 配置Python环境（TrendRadar大多是Python写的）
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 按项目要求改，不懂就用3.10通用版

      - name: 安装项目依赖库
        run: pip install -r requirements.txt # 项目有依赖文件才执行，没有就删掉这行

      # 核心：把GitHub密钥读取到运行环境中
      - name: 注入企业微信密钥变量
        env:
          WECHAT_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          # ==========TrendRadar启动命令（已适配你仓库结构，直接用）==========
          python trendradar/main.py
          # ======================================================

          # 调用企业微信机器人推送消息（通用curl命令，直接用）
          curl -X POST https://qyapi.weixin.qq.com/cgi-bin/webhook/send \
          -H "Content-Type: application/json" \
          -d "{
              \"msgtype\": \"text\",
              \"text\": {\"content\": \"✅TrendRadar任务已跑完✅ 数据同步完成，请查收！\n密钥环境加载正常\"}
          }"
